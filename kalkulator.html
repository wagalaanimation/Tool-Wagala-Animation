<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0; padding: 0; 
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: 
            linear-gradient(135deg, #000000 0%, #1a0000 50%, #000000 100%);
            background-size: 90% 90%;
            min-height: 100vh;
            color: white;
            animation: gradientBG 6s ease infinite;
            padding: 40px 20px;
            overflow-y: auto;
        }

        @keyframes gradientBG {
        0% {
            background-position: 0% 0%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 0%;
        }
        }

        .back-btn {
            position: absolute; 
            top: 20px; left: 20px;
            color: #ff3131; 
            text-decoration: none; 
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover { 
            color: white; 
        }

        .main-container { 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .title { 
            text-align: center; 
            margin-bottom: 30px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 20px; 
            padding: 25px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .input-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }
        label { display: block; 
            margin-bottom: 5px; 
            font-size: 0.9rem; 
            color: #ccc; 
        }

        input {
            width: 100%; 
            padding: 12px; 
            border-radius: 10px;
            border: none; 
            background: #1a1a1a; color: white; outline: none;
        }

        .add-btn {
            width: 100%; 
            padding: 12px; 
            background: #00c853;
            color: white; 
            border: none; 
            border-radius: 10px;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
        }
        .add-btn:hover { 
            background: #00a042; 
            transform: translateY(-2px); 
        }

        .list-wrapper { 
            margin-top: 25px; 
            text-align: left; 
        }
        ul { 
            list-style: none; 
            margin-top: 10px; 
            max-height: 250px; 
            overflow-y: auto; 
        }

        li {
            background: rgba(255, 49, 49, 0.2);
            padding: 10px 15px; 
            border-radius: 8px;
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between;
            border-left: 4px solid #ff3131;
            cursor: pointer; transition: 0.2s;
            position: relative;
        }
        li:hover { 
            background: rgba(255, 49, 49, 0.4); 
            transform: scale(1.02); 
        }
        li:hover::after {
            content: 'Klik untuk hapus';
            position: absolute; 
            right: 10px; 
            top: -15px;
            font-size: 10px; 
            background: #ff3131; 
            padding: 2px 5px; 
            border-radius: 4px;
        }

        .chart-container {
            height: 300px; 
            position: relative;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        #emptyMsg { 
            position: absolute; 
            color: #666; 
            font-style: italic; 
        }

        .total-section {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 20px;
        }
        .total-box { 
            background: #00c853; 
            padding: 15px; 
            border-radius: 12px; 
        }
        .total-box span { font-size: 0.7rem; 
            text-transform: uppercase; 
            font-weight: bold; 
        }

        /* reponsif hp */
@media (max-width: 600px) {
    body {
        padding: 30px;
    }

    .title {
        font-size: 1.5rem;
        margin-top: 30px;
        margin-bottom: 30px;
    }

    .grid-layout {
        grid-template-columns: 1fr;
        gap: 20px;
    }

    .card {
        padding: 15px;
    }

    .chart-container {
        height: 250px;
    }

    .total-section {
        grid-template-columns: 1fr;
        gap: 10px;
    }

    .total-box {
        padding: 12px;
    }

    .total-box h2 {
        font-size: 1.3rem;
    }

    li {
        font-size: 0.9rem;
    }
}
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>

    <div class="main-container">
        <h1 class="title">Kalkulator Langganan</h1>

        <div class="grid-layout">
            <div class="card card-input">
                <div class="input-group">
                    <label>Nama Langganan</label>
                    <input type="text" id="namaInput" placeholder="Contoh: Netflix">
                </div>
                <div class="input-group">
                    <label>Harga Bulanan (Rp)</label>
                    <input type="number" id="hargaInput" placeholder="Contoh: 54000">
                </div>
                <button onclick="tambahData()" class="add-btn">Tambahkan</button>

                <div class="list-wrapper">
                    <h3>Daftar Langganan</h3>
                    <ul id="daftarList"></ul>
                </div>
            </div>

            <div class="card card-chart">
                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                    <div id="emptyMsg">Belum ada data</div>
                </div>

                <div class="total-section">
                    <div class="total-box">
                        <span>Total Bulanan</span>
                        <h2 id="totalBulanan">Rp.0</h2>
                    </div>
                    <div class="total-box">
                        <span>Total Tahunan</span>
                        <h2 id="totalTahunan">Rp.0</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    let dataLangganan = [];
    let chart = null;

    function tambahData() {
        const namaEl = document.getElementById('namaInput');
        const hargaEl = document.getElementById('hargaInput');
        
        const nama = namaEl.value.trim();
        const harga = parseInt(hargaEl.value);

        if (nama !== "" && !isNaN(harga)) {
            // Tambahkan status 'aktif' secara default
            dataLangganan.push({ nama, harga, aktif: true });
            namaEl.value = '';
            hargaEl.value = '';
            updateTampilan();
        } else {
            alert("Mohon isi Nama dan Harga dengan benar!");
        }
    }

    function hapusData(index) {
        dataLangganan.splice(index, 1);
        updateTampilan();
    }

    function updateTampilan() {
        const list = document.getElementById('daftarList');
        const emptyMsg = document.getElementById('emptyMsg');

        list.innerHTML = '';
        dataLangganan.forEach((item, index) => {
            const li = document.createElement('li');
            li.setAttribute('onclick', `hapusData(${index})`);
            li.innerHTML = `
                <span>${index + 1}. ${item.nama}</span>
                <span>Rp.${item.harga.toLocaleString('id-ID')}</span>
            `;
            list.appendChild(li);
        });

        emptyMsg.style.display = dataLangganan.length > 0 ? 'none' : 'block';
        updateChart();
    }

    function updateChart() {
        const canvas = document.getElementById('myChart');
        const ctx = canvas.getContext('2d');

        if (chart) { chart.destroy(); }
        if (dataLangganan.length === 0) {
            document.getElementById('totalBulanan').innerText = `Rp.0`;
            document.getElementById('totalTahunan').innerText = `Rp.0`;
            return;
        }

        const labels = dataLangganan.map(d => d.nama);
        const values = dataLangganan.map(d => d.harga);

        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#ff3131', '#448aff', '#ffeb3b', '#e91e63', '#00e676', '#9c27b0', '#ff9800'],
                    borderWidth: 1,
                    borderColor: '#000'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: 'white', font: { size: 11 } },
                        onClick: function(e, legendItem, legend) {
                            const index = legendItem.index;
                            const ci = legend.chart;
                            
                            // 1. Toggle visual di chart
                            ci.toggleDataVisibility(index);
                            ci.update();

                            // 2. TANDAI DI DATA
                            // Kalau visible di chart, berarti 'aktif' di data kita
                            dataLangganan[index].aktif = ci.getDataVisibility(index);
                            
                            // 3. Hitung ulang pakai data kita sendiri
                            hitungUlangDariData();
                        }
                    }
                }
            }
        });

        // Hitung total awal
        hitungUlangDariData();
    }

    function hitungUlangDariData() {
        let totalBaru = 0;

        dataLangganan.forEach((item) => {
            // Hanya hitung yang statusnya 'aktif' (nggak dicoret)
            if (item.aktif === true) {
                totalBaru += item.harga;
            }
        });

        document.getElementById('totalBulanan').innerText = `Rp.${totalBaru.toLocaleString('id-ID')}`;
        document.getElementById('totalTahunan').innerText = `Rp.${(totalBaru * 12).toLocaleString('id-ID')}`;
        
        // Efek kedip
        const box = document.getElementById('totalBulanan');
        box.style.opacity = '0.5';
        setTimeout(() => { box.style.opacity = '1'; }, 100);
    }
</script>
</body>
</html>
