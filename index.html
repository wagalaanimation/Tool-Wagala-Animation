<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYFRAME OS CONTROL - Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f0712;
            --primary: #3A233F;
            --primary-light: #5a3760;
            --accent: #b388ff;
            --accent-glow: 0 0 20px rgba(179, 136, 255, 0.5);
            --neon-blue: #00f0ff;
            --neon-blue-glow: 0 0 15px rgba(0, 240, 255, 0.4);
            --danger: #ff4a4a;
            --text-main: #f5f5f5;
            --text-muted: #a097a3;
            --glass: rgba(58, 35, 63, 0.35);
            --glass-border: rgba(179, 136, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Ambient Animated Background Clouds */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(58, 35, 63, 0.8) 0%, rgba(15, 7, 18, 0) 70%);
            z-index: -1;
            animation: pulseGlow 12s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(179, 136, 255, 0.15) 0%, rgba(15, 7, 18, 0) 70%);
            z-index: -1;
            animation: pulseGlow 8s infinite alternate-reverse ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.7; }
            100% { transform: scale(1.1) translate(30px, -30px); opacity: 1; }
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 35px;
            animation: fadeIn System 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInSystem {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER CENTER */
        header {
            text-align: center;
            position: relative;
        }

        header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2), 0 0 30px var(--primary-light);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        header h1 span {
            color: var(--accent);
            text-shadow: var(--accent-glow);
        }

        header .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* CORE GLASS PANEL */
        .control-panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .panel-section-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            color: var(--accent);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border), transparent);
        }

        /* FORM ELEMENTS */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (min-width: 600px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 7, 18, 0.6);
            border: 1px solid rgba(179, 136, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: var(--accent-glow), inset 0 0 8px rgba(179,136,255,0.1);
            background: rgba(15, 7, 18, 0.8);
        }

        /* BUTTON ACTIONS */
        .action-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-create {
            background: linear-gradient(135deg, var(--accent) 0%, #8c52ff 100%);
            color: #0f0712;
            flex: 1;
            min-width: 200px;
            box-shadow: 0 4px 15px rgba(179, 136, 255, 0.2);
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: var(--accent-glow);
            filter: brightness(1.1);
        }

        .btn-open-direct {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.05);
        }

        .btn-open-direct:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: var(--neon-blue-glow);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* LAUNCHER GRID APP LIST */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        @media (min-width: 600px) {
            .app-grid { grid-template-columns: 1fr 1fr; }
        }

        /* Custom Scrollbar for list panel */
        .app-grid::-webkit-scrollbar { width: 6px; }
        .app-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .app-grid::-webkit-scrollbar-thumb { background: rgba(179, 136, 255, 0.2); border-radius: 10px; }
        .app-grid::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .app-card {
            background: rgba(15, 7, 18, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent);
            border-radius: 10px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
            transition: all 0.3s ease;
            animation: cardSpawn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        @keyframes cardSpawn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .app-card:hover {
            background: rgba(58, 35, 63, 0.5);
            border-color: rgba(179, 136, 255, 0.3);
            border-left-color: var(--neon-blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .app-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0; /* Ensures text-overflow triggers properly */
        }

        .app-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .app-path {
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: monospace;
            background: rgba(0,0,0,0.2);
            padding: 3px 6px;
            border-radius: 4px;
            width: fit-content;
            max-width: 100%;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn-card-launch {
            padding: 8px 16px;
            font-size: 0.9rem;
            background: rgba(179, 136, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(179, 136, 255, 0.3);
            flex: 1;
        }

        .btn-card-launch:hover {
            background: var(--accent);
            color: #0f0712;
            box-shadow: var(--accent-glow);
        }

        .btn-card-delete {
            padding: 8px 12px;
            font-size: 0.9rem;
            background: transparent;
            border: 1px solid rgba(255, 74, 74, 0.3);
            color: var(--danger);
        }

        .btn-card-delete:hover {
            background: rgba(255, 74, 74, 0.15);
            border-color: var(--danger);
            box-shadow: 0 0 10px rgba(255, 74, 74, 0.2);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            border: 1px dashed rgba(255,255,255,0.08);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Tool <span>Wagala</span> animation</h1>
            <div class="subtitle">Tool pendukung Produksi</div>
        </header>

        <div class="control-panel">
            
            <div class="panel-section-title">⚡ Generator Inti Aplikasi</div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="app-name">Nama Aplikasi</label>
                    <div class="input-wrapper">
                        <input type="text" id="app-name" placeholder="Contoh: PRODVAULT">
                    </div>
                </div>
                <div class="form-group">
                    <label for="app-path">Nama / Lokasi File HTML</label>
                    <div class="input-wrapper">
                        <input type="text" id="app-path" placeholder="Contoh: PRODVAULT.html">
                    </div>
                </div>
            </div>

            <div class="action-container">
                <button class="btn-create" onclick="registerApplication()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    BUAT APLIKASI
                </button>
                <button class="btn-open-direct" onclick="launchDirectPath()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                    BUKA LANGSUNG
                </button>
            </div>

            <div class="panel-section-title" style="margin-top: 45px;">🖥️ Aplikasi</div>
            
            <div class="app-grid" id="launcher-hub-grid">
                </div>

        </div>
    </div>

    <script>
        // --- KEYFRAME OS DATABASE LOGIC ---
        let systemApps = JSON.parse(localStorage.getItem('keyframeOSApps')) || [];

        // Inisialisasi awal saat halaman dimuat
        document.addEventListener('DOMContentLoaded', () => {
            renderLauncherHub();
        });

        // 1. Fungsi Menampilkan Semua Aplikasi Terdaftar
        function renderLauncherHub() {
            const grid = document.getElementById('launcher-hub-grid');
            grid.innerHTML = '';

            if (systemApps.length === 0) {
                grid.innerHTML = `<div class="empty-state">Belum ada core aplikasi terdaftar. Silakan buat satu di atas.</div>`;
                return;
            }

            systemApps.forEach(app => {
                const cardHtml = `
                    <div class="app-card" id="app-${app.id}">
                        <div class="app-info">
                            <div class="app-name" title="${app.name}">${app.name}</div>
                            <div class="app-path" title="${app.path}">${app.path}</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-card-launch" onclick="bootApplication('${app.path}')">
                                Gunakan
                            </button>
                            <button class="btn-card-delete" onclick="purgeApplication('${app.id}', '${app.name}')" title="Hapus Aplikasi">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 2. Fungsi Tombol "BUAT APLIKASI" (Diperbarui dengan Validasi File Nyata)
        async function registerApplication() {
            const nameInput = document.getElementById('app-name');
            const pathInput = document.getElementById('app-path');
            
            const name = nameInput.value.trim();
            const path = pathInput.value.trim();

            if (!name || !path) {
                alert("Gagal Inisialisasi: Nama Aplikasi dan Path HTML tidak boleh kosong!");
                return;
            }

            // BAGIAN VALIDASI BARU: Cek apakah file benar-benar ada
            const fileExists = await verifyFileExists(path);
            if (!fileExists) {
                alert("mohon maaf sepertinnya ada yang salah dibagian nama/lokasi file");
                return; // Menghentikan proses jika file salah/tidak ditemukan
            }

            const newApp = {
                id: 'app-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4),
                name: name,
                path: path
            };

            systemApps.push(newApp);
            localStorage.setItem('keyframeOSApps', JSON.stringify(systemApps));

            // Bersihkan Input Form
            nameInput.value = '';
            pathInput.value = '';

            // Render Ulang Interface Grid Launcher
            renderLauncherHub();
        }

        // 3. Fungsi Tombol "BUKA LANGSUNG" (Diperbarui dengan Validasi File Nyata)
        async function launchDirectPath() {
            const pathInput = document.getElementById('app-path').value.trim();

            if (!pathInput) {
                alert("Gagal Eksekusi: Masukkan nama/lokasi file HTML terlebih dahulu di kolom input!");
                return;
            }

            // BAGIAN VALIDASI BARU: Cek file sebelum membuka langsung
            const fileExists = await verifyFileExists(pathInput);
            if (!fileExists) {
                alert("mohon maaf sepertinnya ada yang salah dibagian nama/lokasi file");
                return; // Menghentikan proses jika file salah/tidak ditemukan
            }

            bootApplication(pathInput);
        }

        // 4. Core Core Launcher Booting File HTML
        function bootApplication(path) {
            // Membuka file html lokal atau eksternal pada tab baru
            window.open(path, '_blank');
        }

        // 5. Fungsi "HAPUS" (Menghapus aplikasi dari database launcher)
        function purgeApplication(id, name) {
            if (confirm(`Putuskan koneksi dan hapus launcher untuk "${name}"?`)) {
                systemApps = systemApps.filter(app => app.id !== id);
                localStorage.setItem('keyframeOSApps', JSON.stringify(systemApps));
                renderLauncherHub();
            }
        }

        // Fungsi baru untuk mengecek apakah file benar-benar ada di lokasi tersebut
        async function verifyFileExists(path) {
            try {
                // Melakukan request HEAD (hanya cek status file tanpa mendownload isinya)
                const response = await fetch(path, { method: 'HEAD' });
                return response.ok; // Menghasilkan true jika file ditemukan (status 200), false jika 404
            } catch (error) {
                return false; // Menghasilkan false jika file tidak ada atau salah lokasi
            }
        }
    </script>
</body>
</html>
